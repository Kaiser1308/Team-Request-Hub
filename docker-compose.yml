services:
  web:
    build:
      context: ./apps/web
    env_file:
      - ./apps/web/.env.local
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env
    environment:
      APP_ENV: production
      MINIO_ENDPOINT: minio:9000
      MINIO_BUCKET: ${MINIO_BUCKET:-team-files}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: "false"
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_URL:-https://minio.kaiser-bot.online}
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_PUBLIC_URL:-https://minio.kaiser-bot.online}
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-team-files}
    volumes:
      - ./minio/cors.xml:/tmp/cors.xml:ro
    entrypoint: >
      /bin/sh -c '
      mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}";
      mc mb --ignore-existing "local/$${MINIO_BUCKET}";
      mc anonymous set none "local/$${MINIO_BUCKET}";
      '
    restart: "no"

  cloudflared:
    image: cloudflare/cloudflared:2025.11.1
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - web
      - api
      - minio
    restart: unless-stopped

volumes:
  minio_data:
