<script>
        // Micro-interaction for the login flow
        function handleLogin() {
            const btn = document.querySelector('button');
            const originalContent = btn.innerHTML;
            
            // Add loading state
            btn.innerHTML = `
                <div class="w-5 h-5 border-2 border-on-secondary-container/30 border-t-on-secondary-container rounded-full animate-spin"></div>
                Authenticating...
            `;
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.7';

            // Simulate redirect delay
            setTimeout(() => {
                // Success visual state before transition
                btn.innerHTML = `
                    <span class="material-symbols-outlined">check_circle</span>
                    Redirecting...
                `;
                btn.classList.replace('bg-secondary-container', 'bg-success');
                
                setTimeout(() => {
                    // This would normally be: window.location.href = '/dashboard';
                    alert('Login successful! Transitioning to Team Request Hub dashboard...');
                    btn.innerHTML = originalContent;
                    btn.style.pointerEvents = 'auto';
                    btn.style.opacity = '1';
                    btn.classList.replace('bg-success', 'bg-secondary-container');
                }, 800);
            }, 1500);
        }

        // Custom Animation definition
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
        `;
        document.head.appendChild(style);
    </script>
